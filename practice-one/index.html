<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice-one</title>
    <link rel="stylesheet" href="./assets/styles/main.css" />
  </head>

  <body>
    <div class="hero-wrapper">
      <!-- HEADER -->
      <header class="header">
        <div class="container header-inner">
          <div class="logo">Vaccination.ng</div>

          <nav class="nav">
            <a class="nav-item is-active">Home</a>
            <a class="nav-item">Services</a>
            <a class="nav-item">Schedule</a>
            <a class="nav-item">Contact us</a>
          </nav>

          <button class="btn btn-normal">Check Status</button>
        </div>
      </header>

      <!-- HERO -->
      <section class="hero" aria-labelledby="hero-title">
        <div class="container hero-inner">
          <!-- LEFT -->
          <div class="hero-content">
            <p class="hero-subtitle">
              Get Vaccinated. Boost your Immune System
            </p>

            <h1 class="hero-title" id="hero-title">
              COVID-19 Vaccination <br />
              Got Easier With, <br />
              <span>Vaccination.ng</span>
            </h1>

            <p class="hero-desc">
              Vaccination.ng will help you find the nearest centre for
              vaccination, in all 36 states in Nigeria.
            </p>

            <div class="hero-actions">
              <button class="btn btn-primary">Get Vaccine</button>

              <button class="btn btn-outline">Help Centre</button>
            </div>
          </div>

          <!-- RIGHT -->
          <div class="hero-image">
            <!-- Main image -->
            <img
              class="hero-image__main"
              src="./assets/images/vaccine1.png"
              alt="Person receiving COVID-19 vaccine"
            />

            <!-- Badge left (decorative) -->
            <div class="hero-image__badge hero-image__badge--left">
              <img src="./assets/images/doctor.png" alt="" aria-hidden="true" />
            </div>

            <!-- Badge right (decorative) -->
            <div class="hero-image__badge hero-image__badge--right">
              <img
                src="./assets/images/virus-pink.png"
                alt=""
                aria-hidden="true"
              />
            </div>

            <!-- Doctors cluster -->
            <div
              class="hero-image__doctors"
              aria-label="More than 20 medical specialists available"
            >
              <div class="doctors__avatars">
                <img src="./assets/images/avatar-doctor1.png" alt="Doctor" />
                <img src="./assets/images/avatar-doctor2.png" alt="Doctor" />
                <img src="./assets/images/avatar-doctor3.png" alt="Doctor" />
              </div>

              <div class="doctors__info">
                <span class="doctors__count">20+</span>
                <span class="doctors__label">Specialists</span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
