<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice-one</title>
    <link rel="stylesheet" href="./assets/styles/main.css" />
  </head>

  <body>
    <div class="hero-wrapper">
      <!-- HEADER -->
      <header class="header">
        <div class="container header-inner">
          <div class="logo">Vaccination.ng</div>

          <nav class="nav">
            <a class="nav-item is-active">Home</a>
            <a class="nav-item">Services</a>
            <a class="nav-item">Schedule</a>
            <a class="nav-item">Contact us</a>
          </nav>

          <button class="btn btn-normal">Check Status</button>
        </div>
      </header>

      <!-- HERO -->
      <section class="hero">
        <!-- LEFT -->
        <div class="hero-content">
          <p class="hero-subtitle">Get Vaccinated. Boost your Immune System</p>

          <h1 class="hero-title">
            COVID-19 Vaccination <br />
            Got Easier With, <br />
            <span>Vaccination.ng</span>
          </h1>

          <p class="hero-desc">
            Vaccination.ng will help you find the nearest centre for
            vaccination, in all 36 states in Nigeria.
          </p>

          <div class="hero-actions">
            <button class="btn btn-primary">Get Vaccine</button>
            <button class="btn btn-outline">Help Centre</button>
          </div>
        </div>

        <!-- RIGHT -->
        <div class="hero-image">
          <!-- Main image at the center -->
          <img
            class="hero-image__main"
            src="./assets/images/vaccine1.png"
            alt="Vaccine"
          />

          <!-- Badge left -->
          <div class="hero-image__badge hero-image__badge--left">
            <img src="./assets/images/doctor.png" alt="Doctor illustration" />
          </div>

          <!-- Badge right -->
          <div class="hero-image__badge hero-image__badge--right">
            <img
              src="./assets/images/virus-pink.png"
              alt="Virus illustration"
            />
          </div>

          <!-- Doctors cluster at the bottom left -->
          <div class="hero-image__doctors">
            <div class="doctors__avatars">
              <img src="./assets/images/avatar-doctor1.png" alt="Doctor 1" />
              <img src="./assets/images/avatar-doctor2.png" alt="Doctor 2" />
              <img src="./assets/images/avatar-doctor3.png" alt="Doctor 3" />
            </div>
            <div class="doctors__info">
              <span class="doctors__count">20+</span>
              <span class="doctors__label">Specialists</span>
            </div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
